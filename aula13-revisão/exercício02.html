<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nascionalidade</title>
</head>
<body>
    <h1>Descubra sua Nascionalidade!</h1>
    <input type="text" name="txtpais" id="txtpais">
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="res"></div>
    <script>
        function calcular() {
            var txtpais = document.getElementById('txtpais')
            var res = document.getElementById('res')
            var pais = txtpais.value 
            res.innerHTML = `<p> Você nasceu em ${pais} </p>`
                if (pais == `Brasil`) {
                    res.innerHTML += `<p> Você é Brasileiro </p>`
                } else {
                    res.innerHTML += `<p> Você é estrangeiro </p>`
                }
        }
    </script>
</body>
</html>
